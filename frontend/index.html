<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1b1410">
<title>对话·马克思</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   TOKEN SYSTEM — 马克思书房
══════════════════════════════════════ */
:root {
  --bg:       #1b1410;
  --bg2:      #231a14;
  --bg3:      #2c2018;
  --bg4:      #342518;
  --gold:     #c8a36a;
  --gold-l:   #e1c28a;
  --gold-dim: rgba(200,163,106,.3);
  --gold-glow:rgba(200,163,106,.12);
  --red:      #8b2e2e;
  --red-l:    #b84040;
  --text:     #f5e7d0;
  --text-dim: #cdbb9e;
  --text-mu:  #8a7560;
  --border:   rgba(200,163,106,.22);
  --border-l: rgba(200,163,106,.42);
  --r:        14px;
  --r-sm:     8px;
}

/* ══════════════════════════════════════
   RESET & BASE
══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  height: 100dvh;
  position: relative;
}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
.hd {
  flex-shrink: 0;
  padding: 10px 18px 8px;
  background: linear-gradient(180deg,#1b1410 0%,rgba(27,20,16,0) 100%);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  position: relative;
  z-index: 10;
}
.hd-left { display: flex; flex-direction: column; gap: 1px; }
.hd-name {
  font-family: 'IM Fell English', 'Georgia', serif;
  font-size: 20px;
  color: var(--gold-l);
  letter-spacing: .08em;
  line-height: 1;
}
.hd-sub {
  font-size: 10px;
  color: var(--text-mu);
  letter-spacing: .05em;
}
.hd-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}
.hd-loc {
  font-size: 11px;
  color: var(--text-mu);
  font-style: italic;
  font-family: 'IM Fell English', serif;
}
.hd-mode {
  font-size: 10px;
  color: var(--gold);
  letter-spacing: .04em;
  display: flex;
  align-items: center;
  gap: 4px;
}
.hd-mode-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 5px var(--gold);
  animation: modePulse 2s ease-in-out infinite;
}
@keyframes modePulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ══════════════════════════════════════
   PORTRAIT SECTION（马克思图像区）
══════════════════════════════════════ */
.portrait-section {
  flex-shrink: 0;
  position: relative;
  height: 42vh;
  overflow: hidden;
  margin: 0 14px;
  border-radius: var(--r);
  border: 1px solid var(--border-l);
  box-shadow:
    0 0 0 1px rgba(200,163,106,.06),
    inset 0 0 60px rgba(0,0,0,.5),
    0 8px 32px rgba(0,0,0,.6);
}

/* 四角装饰 */
.corner { position: absolute; width: 18px; height: 18px; z-index: 5; }
.corner::before, .corner::after {
  content: '';
  position: absolute;
  background: var(--gold-l);
  opacity: .8;
}
.corner.tl { top: 8px; left: 8px; }
.corner.tl::before { width: 100%; height: 1.5px; top: 0; left: 0; }
.corner.tl::after  { width: 1.5px; height: 100%; top: 0; left: 0; }
.corner.tr { top: 8px; right: 8px; }
.corner.tr::before { width: 100%; height: 1.5px; top: 0; right: 0; }
.corner.tr::after  { width: 1.5px; height: 100%; top: 0; right: 0; }
.corner.bl { bottom: 8px; left: 8px; }
.corner.bl::before { width: 100%; height: 1.5px; bottom: 0; left: 0; }
.corner.bl::after  { width: 1.5px; height: 100%; bottom: 0; left: 0; }
.corner.br { bottom: 8px; right: 8px; }
.corner.br::before { width: 100%; height: 1.5px; bottom: 0; right: 0; }
.corner.br::after  { width: 1.5px; height: 100%; bottom: 0; right: 0; }

/* 马克思照片 */
.marx-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
  transition: opacity .5s ease;
}

/* 视频（实时语音时覆盖照片） */
.marx-video {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity .5s ease;
  z-index: 2;
}
.marx-video.active { opacity: 1; }

/* 底部渐变遮罩 */
.portrait-gradient {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 55%;
  background: linear-gradient(
    to top,
    rgba(27,20,16,1) 0%,
    rgba(27,20,16,.7) 40%,
    transparent 100%
  );
  z-index: 3;
}

/* 名言浮层 */
.portrait-quote {
  position: absolute;
  bottom: 14px;
  left: 14px; right: 14px;
  z-index: 4;
  transition: opacity .5s ease;
}
.portrait-quote.hidden { opacity: 0; pointer-events: none; }
.quote-text {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 12.5px;
  color: var(--text-dim);
  line-height: 1.75;
  letter-spacing: .02em;
}
.quote-author {
  font-size: 11px;
  color: var(--gold-dim);
  margin-top: 5px;
  font-style: italic;
  font-family: 'IM Fell English', serif;
}
.quote-author::before { content: '— '; }

/* 状态角标 */
.portrait-status {
  position: absolute;
  top: 10px; left: 10px;
  z-index: 5;
  background: rgba(27,20,16,.85);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: .05em;
  backdrop-filter: blur(4px);
  transition: opacity .3s;
}
.portrait-status.hidden { opacity: 0; }

/* ══════════════════════════════════════
   STATUS BAR（状态条）
══════════════════════════════════════ */
.status-bar {
  flex-shrink: 0;
  margin: 6px 14px 0;
  height: 30px;
  background: linear-gradient(90deg, var(--bg3), var(--bg2), var(--bg3));
  border: 1px solid var(--border);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.status-bar-text {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: .05em;
}
.status-dots { display: flex; gap: 4px; }
.status-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--gold-dim);
}
.status-dot:nth-child(1) { animation: sd .9s ease-in-out infinite; }
.status-dot:nth-child(2) { animation: sd .9s ease-in-out .3s infinite; }
.status-dot:nth-child(3) { animation: sd .9s ease-in-out .6s infinite; }
@keyframes sd { 0%,80%,100%{opacity:.3;transform:scale(1)} 40%{opacity:1;transform:scale(1.4)} }
.status-dots.hidden { display: none; }

/* ══════════════════════════════════════
   MAIN CONTENT AREA
══════════════════════════════════════ */
.main {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.scroll {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px 8px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}
.scroll::-webkit-scrollbar { width: 2px; }
.scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ══════════════════════════════════════
   IDLE STATE（待机 — 推荐问题）
══════════════════════════════════════ */
.idle-panel { display: flex; flex-direction: column; gap: 10px; }

.guide-label {
  font-size: 10px;
  color: var(--text-mu);
  letter-spacing: .1em;
  text-transform: uppercase;
  text-align: center;
  padding: 2px 0;
}

.guide-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}
.guide-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 9px 11px;
  font-size: 12px;
  color: var(--text-dim);
  cursor: pointer;
  line-height: 1.5;
  font-family: 'Noto Serif SC', serif;
  transition: all .22s ease;
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.guide-card-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
.guide-card:active {
  border-color: var(--gold-dim);
  color: var(--gold);
  background: var(--bg3);
  box-shadow: 0 0 14px var(--gold-glow);
}

/* 入口按钮 */
.entry-row {
  display: flex;
  gap: 7px;
  justify-content: center;
}
.entry-btn {
  flex: 1;
  max-width: 140px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 8px 10px;
  font-size: 11px;
  color: var(--text-mu);
  cursor: pointer;
  font-family: inherit;
  letter-spacing: .04em;
  transition: all .22s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.entry-btn:active {
  border-color: var(--gold-dim);
  color: var(--gold);
  background: var(--gold-glow);
}

/* ══════════════════════════════════════
   DIALOGUE LOG（对话记录）
══════════════════════════════════════ */
.dialogue { display: flex; flex-direction: column; gap: 14px; }

/* 时间分割线 */
.time-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 10px;
  color: var(--text-mu);
  letter-spacing: .05em;
}
.time-divider::before, .time-divider::after {
  content: '';
  flex: 1;
  height: .5px;
  background: var(--border);
}

/* 用户消息 */
.q-row { display: flex; justify-content: flex-end; }
.q-bbl {
  max-width: 78%;
  background: rgba(139,46,46,.14);
  border: 1px solid rgba(139,46,46,.28);
  border-radius: 12px 12px 2px 12px;
  padding: 9px 13px;
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.7;
}

/* 语音消息 */
.voice-row { display: flex; justify-content: flex-end; }
.voice-bbl {
  background: rgba(139,46,46,.1);
  border: 1px solid rgba(139,46,46,.22);
  border-radius: 20px;
  padding: 8px 14px;
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 7px;
}
.voice-wave { color: var(--gold-dim); font-size: 14px; }

/* 马克思回答（羊皮纸卡片）*/
.a-row { display: flex; flex-direction: column; gap: 5px; }
.a-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-left: 2px;
}
.a-avatar {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1px solid var(--gold-dim);
  object-fit: cover;
  flex-shrink: 0;
}
.a-name {
  font-size: 11px;
  color: var(--gold);
  letter-spacing: .06em;
  font-family: 'IM Fell English', serif;
}
.a-card {
  background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
  border: 1px solid var(--border);
  border-radius: 2px 12px 12px 12px;
  padding: 13px 15px 10px;
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.85;
  font-family: 'Noto Serif SC', serif;
  position: relative;
}
.a-card-quote {
  position: absolute;
  top: 6px; left: 10px;
  font-size: 26px;
  color: rgba(200,163,106,.2);
  font-family: Georgia, serif;
  line-height: 1;
  pointer-events: none;
}
.a-card-body { padding-left: 12px; }

/* 打字机效果光标 */
.a-card-body.typing::after {
  content: '▌';
  color: var(--gold);
  animation: cur .6s step-end infinite;
  font-size: 12px;
}
@keyframes cur { 0%,100%{opacity:1} 50%{opacity:0} }

.a-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 9px;
  padding-top: 7px;
  border-top: .5px solid var(--border);
}
.a-cite {
  font-size: 10px;
  color: var(--text-mu);
  font-style: italic;
  font-family: 'IM Fell English', serif;
}
.a-play {
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 10px;
  color: var(--text-mu);
  cursor: pointer;
  font-family: inherit;
  transition: all .2s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.a-play:active { border-color: var(--gold-dim); color: var(--gold); }
.a-play.playing { color: var(--gold); border-color: var(--gold-dim); }

/* 思考中 */
.thinking-row { display: flex; align-items: center; gap: 8px; }
.thinking-avatar {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1px solid var(--gold-dim);
  object-fit: cover;
  flex-shrink: 0;
}
.thinking-bbl {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 2px 12px 12px 12px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.t-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold-dim);
  animation: td .9s ease-in-out infinite;
}
.t-dot:nth-child(2) { animation-delay: .22s; }
.t-dot:nth-child(3) { animation-delay: .44s; }
@keyframes td { 0%,80%,100%{transform:scale(1);opacity:.3} 40%{transform:scale(1.5);opacity:1} }

/* ══════════════════════════════════════
   INPUT AREA
══════════════════════════════════════ */
.ia {
  flex-shrink: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 8px 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

/* 模式标签 */
.mode-tabs {
  display: flex;
  gap: 5px;
  justify-content: center;
}
.mtab {
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 16px;
  font-size: 11px;
  color: var(--text-mu);
  cursor: pointer;
  font-family: inherit;
  letter-spacing: .04em;
  transition: all .2s;
}
.mtab.on {
  border-color: var(--gold-dim);
  color: var(--gold);
  background: var(--gold-glow);
}

/* 文字输入行 */
.text-row {
  display: flex;
  gap: 9px;
  align-items: flex-end;
}
.txt-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 9px 15px;
  font-size: 13.5px;
  color: var(--text);
  resize: none;
  font-family: 'Noto Serif SC', serif;
  line-height: 1.5;
  max-height: 90px;
  outline: none;
  transition: border-color .2s;
}
.txt-input::placeholder { color: var(--text-mu); }
.txt-input:focus { border-color: var(--gold-dim); }

/* 发送按钮 */
.send-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--red);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .2s, transform .1s;
  box-shadow: 0 2px 10px rgba(139,46,46,.4);
}
.send-btn:active { background: var(--red-l); transform: scale(.9); }
.send-btn svg { fill: white; }

/* 语音按钮 */
.mic-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg4);
  border: 1px solid var(--border);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all .2s;
}
.mic-btn svg { stroke: var(--text-mu); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.mic-btn:active { border-color: var(--red); background: rgba(139,46,46,.15); }

/* 按住说话 */
.voice-row-input { display: flex; justify-content: center; }
.hold-btn {
  width: 100%;
  max-width: 260px;
  height: 46px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 23px;
  font-size: 13px;
  color: var(--text-dim);
  cursor: pointer;
  font-family: 'Noto Serif SC', serif;
  letter-spacing: .06em;
  transition: all .15s;
  user-select: none;
  -webkit-user-select: none;
}
.hold-btn.pr {
  background: rgba(139,46,46,.18);
  border-color: var(--red);
  color: var(--red-l);
  box-shadow: 0 0 14px rgba(139,46,46,.25);
}

/* 底部名言 */
.footer-quote {
  text-align: center;
  font-size: 10px;
  color: var(--text-mu);
  font-style: italic;
  font-family: 'IM Fell English', serif;
  letter-spacing: .03em;
  padding: 2px 0;
  min-height: 15px;
  transition: opacity .5s;
}

/* HIDDEN */
.hidden { display: none !important; }

/* ── 历史侧滑面板 ── */
.hist-btn {
  background: none;
  border: none;
  color: var(--text-mu);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  flex-shrink: 0;
  transition: color .2s;
}
.hist-btn:active { color: var(--gold); }
.hist-mask {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 200;
  backdrop-filter: blur(2px);
}
.hist-panel {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 80%;
  max-width: 320px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  z-index: 201;
  display: flex;
  flex-direction: column;
  transform: translateX(-100%);
  transition: transform .3s ease;
}
.hist-panel.open { transform: translateX(0); }
.hist-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.hist-title {
  font-size: 14px;
  color: var(--gold);
  font-family: 'IM Fell English', serif;
  letter-spacing: .06em;
}
.hist-new {
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px;
  color: var(--text-dim);
  cursor: pointer;
  font-family: inherit;
  transition: all .2s;
}
.hist-new:active { border-color: var(--gold-dim); color: var(--gold); }
.hist-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.hist-list::-webkit-scrollbar { width: 2px; }
.hist-list::-webkit-scrollbar-thumb { background: var(--border); }
.hist-loading {
  text-align: center;
  padding: 24px;
  font-size: 12px;
  color: var(--text-mu);
}
.hist-item {
  padding: 12px 16px;
  cursor: pointer;
  border-bottom: .5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  transition: background .2s;
}
.hist-item:active { background: var(--bg3); }
.hist-item-left { flex: 1; min-width: 0; }
.hist-item-title {
  font-size: 13px;
  color: var(--text);
  font-family: 'Noto Serif SC', serif;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.hist-item-time {
  font-size: 11px;
  color: var(--text-mu);
  margin-top: 3px;
}
.hist-item-del {
  background: none;
  border: none;
  color: var(--text-mu);
  cursor: pointer;
  font-size: 14px;
  padding: 4px;
  flex-shrink: 0;
  transition: color .2s;
}
.hist-item-del:active { color: var(--red-l); }

/* ══════════════════════════════════════
   LIVE VOICE OVERLAY（实时通话全屏）
══════════════════════════════════════ */
.live-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 100;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
}
.lv-hd {
  flex-shrink: 0;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;

@keyframes micP {

<script>
// ══════════════════════════════════════
// CONFIG — 接入本地后端时只改这里
// ══════════════════════════════════════
const API_BASE = window.location.origin  // 本地后端地址

// ══════════════════════════════════════
// 状态
// ══════════════════════════════════════
let history = []
let sending = false
let ttsOn = false
let currentMode = 'text'
let isRec = false
let shouldSend = false
let mr = null
let aChunks = []
let recStart = 0
let recTimer = null
let liveActive = false
let liveWS = null
let liveAudioQueue = []
let liveAudioPlaying = false
let lastReplyText = ''
let activeVid = 'A'
let currentAudio = null

// ══════════════════════════════════════
// 名言系统
// ══════════════════════════════════════
const QUOTES = [
  '"哲学家们只是用不同方式解释世界，问题在于改变世界。"',
  '"人的本质是一切社会关系的总和。"',
  '"理论一经掌握群众，也会变成物质力量。"',
  '"历史不过是追求着自己目的的人的活动。"',
  '"资本来到世间，每个毛孔都滴着血和肮脏的东西。"',
  '"工人没有祖国，不能剥夺他们没有的东西。"',
]
const FOOTER_QUOTES = [
  '"人的本质是一切社会关系的总和。"',
  '"批判的武器不能代替武器的批判。"',
  '"存在决定意识。"',
]
let qi = 0, fqi = 0

function rotatePortraitQuote() {
  const el = document.getElementById('quoteText')
  if (!el) return
  el.style.opacity = '0'
  setTimeout(() => {
    qi = (qi + 1) % QUOTES.length
    el.textContent = QUOTES[qi]
    el.style.opacity = '1'
  }, 500)
}
function rotateFooterQuote() {
  const el = document.getElementById('footerQuote')
  if (!el) return
  el.style.opacity = '0'
  setTimeout(() => {
    fqi = (fqi + 1) % FOOTER_QUOTES.length
    el.textContent = FOOTER_QUOTES[fqi]
    el.style.opacity = '1'
  }, 500)
}
document.getElementById('quoteText').style.transition = 'opacity .5s ease'
setInterval(rotatePortraitQuote, 6000)
setInterval(rotateFooterQuote, 8000)

// ══════════════════════════════════════
// 模式切换
// ══════════════════════════════════════
function setMode(mode) {
  currentMode = mode
  const textRow = document.getElementById('textRow')
  const voiceRow = document.getElementById('voiceRow')
  const tabText = document.getElementById('tabText')
  const tabVoice = document.getElementById('tabVoice')
  const hdModeText = document.getElementById('hdModeText')

  if (mode === 'text') {
    textRow.classList.remove('hidden')
    voiceRow.classList.add('hidden')
    tabText.classList.add('on')
    tabVoice.classList.remove('on')
    if (hdModeText) hdModeText.textContent = '文字交流'
  } else {
    textRow.classList.add('hidden')
    voiceRow.classList.remove('hidden')
    tabText.classList.remove('on')
    tabVoice.classList.add('on')
    if (hdModeText) hdModeText.textContent = '语音交流'
  }
}

// ══════════════════════════════════════
// 状态栏更新
// ══════════════════════════════════════
const STATUS_MAP = {
  idle:      '📚 马克思正在阅读《资本论》',
  listening: '🎤 马克思正在聆听你的问题',
  thinking:  '📖 马克思正在查阅著作',
  speaking:  '💬 马克思正在回答',
  citing:    '📜 引经据典',
  emphasis:  '✊ 马克思强调观点',
}
function setStatus(state) {
  const bar = document.getElementById('statusBarText')
  const dots = document.getElementById('statusDots')
  const ps = document.getElementById('portraitStatus')
  if (bar) bar.textContent = STATUS_MAP[state] || STATUS_MAP.idle
  if (dots) dots.classList.toggle('hidden', state === 'idle')
  if (ps) {
    ps.textContent = STATUS_MAP[state] || ''
    ps.classList.toggle('hidden', state === 'idle')
  }
}

// ══════════════════════════════════════
// 视频状态机（实时通话用）
// ══════════════════════════════════════
const SPEAKING_GROUP = ['speakA','speakB','theory','citing','emphA','emphB','encourage','summary']
const VIDEO_MAP = {
  idle:      'videos/视频01：待机状态.mp4',
  thinkA:    'videos/视频02：思考状态A.mp4',
  thinkB:    'videos/视频03：思考状态B.mp4',
  speakA:    'videos/视频04：普通讲解A.mp4',
  speakB:    'videos/视频05：普通讲解B.mp4',
  theory:    'videos/视频06：理论讲授.mp4',
  citing:    'videos/视频07：翻书引用.mp4',
  emphA:     'videos/视频08：强调观点A.mp4',
  emphB:     'videos/视频09：强调观点B.mp4',
  encourage: 'videos/视频10：鼓励学生.mp4',
  summary:   'videos/视频11：总结归纳.mp4',
  closing:   'videos/视频12：结束语.mp4',
}
const BADGE_TEXT = {
  idle:      '📚 马克思正在阅读《资本论》',
  thinkA:    '📖 马克思正在查阅著作',
  thinkB:    '📖 马克思正在思考',
  speakA:    '💬 马克思正在回答',
  speakB:    '💬 马克思正在回答',
  theory:    '🎓 理论讲授',
  citing:    '📜 引经据典',
  emphA:     '❓ 马克思正在反问',
  emphB:     '✊ 马克思强调观点',
  encourage: '🌱 马克思正在鼓励',
  summary:   '📋 总结归纳',
  closing:   '📕 本次交流即将结束',
}
var lastSwitchTime = 0
var currentVidState = ''

function setVideoState(state) {
  // 稳定性规则1：同状态不重复切换
  if (currentVidState === state) return
  // 稳定性规则2：非idle状态距上次切换不足3000毫秒直接return
  if (state !== 'idle' && Date.now() - lastSwitchTime < 3000) return
  var src = VIDEO_MAP[state]
  if (!src) return
  var curEl = document.getElementById('liveVid' + activeVid)
  var nxtId = activeVid === 'A' ? 'B' : 'A'
  var nxtEl = document.getElementById('liveVid' + nxtId)
  if (!curEl || !nxtEl) return
  nxtEl.src = src
  nxtEl.loop = (state === 'idle' || state === 'thinkA' || state === 'thinkB')
  nxtEl.load()
  nxtEl.oncanplay = function() {
    nxtEl.play().catch(function(){})
    nxtEl.style.opacity = '1'
    curEl.style.opacity = '0'
    activeVid = nxtId
    setTimeout(function() { curEl.pause(); curEl.src = '' }, 600)
  }
  // 非loop视频播完才允许换下一个
  if (SPEAKING_GROUP.indexOf(state) >= 0) {
    nxtEl.onended = function() {
      if (liveAudioPlaying) {
        // 同组随机轮播
        var alt = state
        while (alt === state) {
          alt = SPEAKING_GROUP[Math.floor(Math.random() * SPEAKING_GROUP.length)]
        }
        setVideoState(alt)
      }
    }
  } else {
    nxtEl.onended = null
  }
  currentVidState = state
  lastSwitchTime = now
  var badge = document.getElementById('lvBadge')
  if (badge) badge.textContent = BADGE_TEXT[state] || ''
}

function pickVideoByReply(text) {
  if (!text) return 'speakA'
  if (text.includes('《') || text.includes('著作') || text.includes('手稿')) return 'citing'
  if (text.includes('总结') || text.includes('综上') || text.includes('因此')) return 'summary'
  if (text.includes('理论') || text.includes('辩证') || text.includes('唯物')) return 'theory'
  if (text.includes('！') && text.length < 80) return 'emphA'
  if (text.includes('必须') || text.includes('绝不') || text.includes('不得不')) return 'emphB'
  return Math.random() > 0.5 ? 'speakA' : 'speakB'
}

// ══════════════════════════════════════
// TTS 开关
// ══════════════════════════════════════
function toggleTTS() {
  ttsOn = !ttsOn
  const btn = document.getElementById('ttsToggleBtn')
  if (btn) btn.style.borderColor = ttsOn ? 'var(--gold-dim)' : ''
}

// ══════════════════════════════════════
// 文字发送
// ══════════════════════════════════════
function resize(el) {
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 90) + 'px'
}
function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send() }
}
function ask(q) {
  document.getElementById('ibox').value = q
  setMode('text')
  send()
}

async function send() {
  if (sending) return
  const text = getMessageWithPrefix()
  if (!text) return
  sending = true
  const box = document.getElementById('ibox')
  box.value = ''; box.style.height = 'auto'

  hideIdle()
  addQ(text)
  history.push({ role: 'user', content: text })

  setStatus('thinking')
  document.getElementById('portraitQuote').classList.add('hidden')
  const tid = addThinking()
  scrollBottom()

  try {
    const res = await fetch(API_BASE + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: history.slice(0, -1), tts: ttsOn })
    })
    const data = await res.json()
    removeEl(tid)
    if (data.error) { addErr(data.error); history.pop() }
    else {
      addA(data.reply, data.audio); autoSaveConversation()
      history.push({ role: 'assistant', content: data.reply })
      if (history.length > 20) history = history.slice(-20)
      setStatus('speaking')
      if (data.audio && ttsOn) {
        playB64(data.audio, null, () => setStatus('idle'))
      } else {
        setTimeout(() => setStatus('idle'), 3000)
      }
    }
  } catch (e) {
    removeEl(tid)
    // 演示模式：没有后端时显示示例回答
    const demoReply = getDemoReply(text)
    addA(demoReply, null)
    history.push({ role: 'assistant', content: demoReply })
    setStatus('speaking')
    setTimeout(() => setStatus('idle'), 4000)
  }

  sending = false
  scrollBottom()
}

// 演示回答（后端未连接时）
function getDemoReply(q) {
  if (q.includes('剩余价值')) return '劳动者创造的价值超出其工资的部分，便是剩余价值——资本家无偿占有的那份。这不是市场的公平，而是剥削的本质。你以为买卖双方平等，却忘了工人卖出的是自己的生命时间。'

// ══════════════════════════════════════
// 语音消息（按住说话）
// ══════════════════════════════════════
function hS(e) {
  e.preventDefault()
  if (isRec) return
  shouldSend = false
  const btn = document.getElementById('holdBtn')
  btn.classList.add('pr'); btn.textContent = '松开 发送'
  startRec()
}
function hE(e) {
  e.preventDefault()
  if (!isRec) return
  shouldSend = true
  const btn = document.getElementById('holdBtn')
  btn.classList.remove('pr'); btn.textContent = '按住 说话'
  if (recTimer) { clearInterval(recTimer); recTimer = null }
  isRec = false
  if (mr && mr.state === 'recording') mr.stop()
}
function hC(e) {
  e.preventDefault()
  if (!isRec) return
  shouldSend = false
  const btn = document.getElementById('holdBtn')
  btn.classList.remove('pr'); btn.textContent = '按住 说话'
  isRec = false
  if (mr && mr.state === 'recording') mr.stop()
}
function startRec() {
  navigator.mediaDevices.getUserMedia({ audio: true }).then(st => {
    const mt = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/webm'
    mr = new MediaRecorder(st, { mimeType: mt })
    aChunks = []; recStart = Date.now()
    mr.ondataavailable = e => { if (e.data.size > 0) aChunks.push(e.data) }
    mr.onstop = () => {
      st.getTracks().forEach(t => t.stop())
      if (shouldSend && aChunks.length > 0) {
        const dur = Math.max(1, Math.floor((Date.now() - recStart) / 1000))
        sendVoice(aChunks.slice(), dur)
      }
      aChunks = []; shouldSend = false
    }
    mr.start(100); isRec = true
  }).catch(e => console.error('[mic]', e))
}
async function sendVoice(chunks, dur) {
  hideIdle()
  // 语音气泡
  const vDiv = document.createElement('div')
  vDiv.className = 'voice-row'
  vDiv.innerHTML = `<div class="voice-bbl"><span class="voice-wave">🎤</span>${dur}" 语音消息</div>`
  document.getElementById('dialogue').appendChild(vDiv)
  scrollBottom()

  setStatus('thinking')
  const tid = addThinking()

  const blob = new Blob(chunks, { type: 'audio/webm' })
  const b64 = await new Promise(res => {
    const r = new FileReader()
    r.onload = () => res(r.result.split(',')[1])
    r.readAsDataURL(blob)
  })

  try {
    const resp = await fetch(API_BASE + '/chat_voice', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ audio_b64: b64, history })
    })
    const data = await resp.json()
    removeEl(tid)
    if (data.transcript) history.push({ role: 'user', content: data.transcript })
    addA(data.reply, data.audio); autoSaveConversation()
    history.push({ role: 'assistant', content: data.reply })
    setStatus('speaking')
    if (data.audio) playB64(data.audio, null, () => setStatus('idle'))
    else setTimeout(() => setStatus('idle'), 3000)
  } catch (e) {
    removeEl(tid)
    addA('语音处理出错，请重试', null)
    setStatus('idle')
  }
  scrollBottom()
}

// ══════════════════════════════════════
// 实时通话
// ══════════════════════════════════════
// ══════════════════════════════════════
// 实时通话 HTTP SSE 模式
// ══════════════════════════════════════
let liveRecState = 'idle'
let liveMediaRec = null, liveRecChunks = [], liveMicStream = null
let liveVADTimer = null, liveVADSilent = 0, liveVADSpeaking = false
let liveAudioCtx = null, liveAnalyser = null

function enterLive() {
  document.getElementById('liveOverlay').classList.remove('hidden')
  document.getElementById('hdModeText').textContent = '实时通话'
  setVideoState('idle')
  lastSwitchTime = 0
  liveActive = true
}
function exitLive() {
  stopLiveMicHTTP()
  document.getElementById('hdModeText').textContent = '文字交流'
  setVideoState('closing')
  setTimeout(function() {
    document.getElementById('liveOverlay').classList.add('hidden')
    ;['liveVidA','liveVidB'].forEach(function(id) {
      var v = document.getElementById(id)
      if (v) { v.pause(); v.src = ''; v.style.opacity = '0' }
    })
    currentVidState = ''
    liveActive = false; liveAudioQueue = []; liveAudioPlaying = false
  }, 1500)
}
function toggleLiveMic(btn) {
  if (liveRecState !== 'idle' && liveRecState !== 'stopped') {
    stopLiveMicHTTP()
    document.getElementById('lvHint').textContent = '点击麦克风开始'
  } else {
    startLiveMicHTTP(btn)
  }
}
function startLiveMicHTTP(btn) {
  if (btn) btn.classList.add('on')
  document.getElementById('lvHint').textContent = '正在启动麦克风...'
  liveRecState = 'starting'
  navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } })
    .then(function(stream) {
      liveMicStream = stream
      liveRecState = 'recording'
      document.getElementById('lvHint').textContent = '正在聆听...'
      setVideoState('idle')
      liveAudioCtx = new (window.AudioContext || window.webkitAudioContext)()
      if (liveAudioCtx.state === 'suspended') liveAudioCtx.resume()
      var src = liveAudioCtx.createMediaStreamSource(stream)
      liveAnalyser = liveAudioCtx.createAnalyser()
      liveAnalyser.fftSize = 256
      src.connect(liveAnalyser)
      startRecSegment()
      var dataArray = new Uint8Array(liveAnalyser.frequencyBinCount)
      liveVADTimer = setInterval(function() {
        if (liveRecState === 'stopped' || liveRecState === 'idle') { clearInterval(liveVADTimer); return }
        liveAnalyser.getByteTimeDomainData(dataArray)
        var maxV = 0
        for (var k = 0; k < dataArray.length; k++) {
          var v = Math.abs(dataArray[k] - 128) / 128
          if (v > maxV) maxV = v
        }
        var hasVoice = maxV > 0.03
        if (hasVoice && !liveVADSpeaking) {
          liveVADSpeaking = true; liveVADSilent = 0
          document.getElementById('lvHint').textContent = '正在听您说话...'
        } else if (!hasVoice && liveVADSpeaking) {
          liveVADSilent += 200
          if (liveVADSilent >= 2200) {
            liveVADSpeaking = false; liveVADSilent = 0
            finishSegAndSend()
          }
        } else if (hasVoice && liveVADSpeaking) { liveVADSilent = 0 }
      }, 200)
    })
    .catch(function(e) {
      console.error('[liveHTTP] mic failed:', e)
      document.getElementById('lvHint').textContent = '麦克风失败: ' + e.message
      liveRecState = 'idle'
    })
}
function startRecSegment() {
  if (liveRecState === 'stopped' || liveRecState === 'idle' || !liveMicStream) return
  if (liveRecState === 'waiting') return
  liveRecChunks = []
  var mt = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm'
  var rec = new MediaRecorder(liveMicStream, { mimeType: mt })
  liveMediaRec = rec
  rec.ondataavailable = function(e) { if (e.data.size > 0) liveRecChunks.push(e.data) }
  rec.onstop = function() {
    if (liveRecChunks.length > 0 && liveRecState !== 'stopped' && liveRecState !== 'idle') {
      sendSegHTTP(liveRecChunks)
    } else if (liveRecState !== 'stopped' && liveRecState !== 'idle') {
      startRecSegment()
    }
  }
  rec.start()
  setTimeout(function() { if (rec.state === 'recording' && liveRecState !== 'stopped') rec.stop() }, 10000)
}
function finishSegAndSend() {
  if (liveMediaRec && liveMediaRec.state === 'recording') {
    liveVADSpeaking = false
    document.getElementById('lvHint').textContent = '处理中...'
    liveMediaRec.stop()
  }
}
function sendSegHTTP(chunks) {
  if (liveRecState === 'stopped' || liveRecState === 'idle') return
  liveRecState = 'waiting'
  document.getElementById('lvHint').textContent = '马克思正在思考'
  var blob = new Blob(chunks, { type: 'audio/webm' })
  var reader = new FileReader()
  reader.onload = function() {
    var b64 = reader.result.split(',')[1]
    // 第一步：只做语音识别，不需要LLM回复（chat_stream会再做）
    fetch(API_BASE + '/asr', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ audio_b64: b64 })
    })
    .then(function(r) { return r.json() })
    .then(function(d) {
      var transcript = d.text || d.transcript || ''
      if (!transcript) { resumeListenHTTP(); return }
      var tlog = document.getElementById('lvTlog')
      var elMarx = document.getElementById('lvMarx')
      if (elMarx) elMarx.textContent = ''
      var elUser = document.getElementById('lvUser')
      if (elUser) elUser.textContent = transcript
      if (tlog) {
        var userLine = document.createElement('div')
        userLine.className = 'tl-user'
        userLine.textContent = transcript
        tlog.appendChild(userLine)
        tlog.scrollTop = tlog.scrollHeight
      }
      var marxLine = null
      if (tlog) {
        marxLine = document.createElement('div')
        marxLine.className = 'tl-marx'
        marxLine.textContent = ''
        tlog.appendChild(marxLine)
      }
      if (transcript) history.push({ role: 'user', content: transcript })
      document.getElementById('lvHint').textContent = '马克思正在思考'
      fetch(API_BASE + '/chat_stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: transcript, history: history.slice(-8) })
      })
      .then(function(resp) {
        var rdr = resp.body.getReader()
        var decoder = new TextDecoder()
        var buf = ''
        var fullReply = ''
        function readChunk() {
          rdr.read().then(function(result) {
            if (result.done) {
              if (history) { history.push({role:'assistant', content: fullReply}); if (history.length > 20) history = history.slice(-20) }
              // 流结束，如果音频已播完则切idle
              if (!liveAudioPlaying && liveAudioQueue.length === 0) {
                setVideoState('idle')
              }
              resumeListenHTTP()
              return
            }
            buf += decoder.decode(result.value, {stream: true})
            var lines = buf.split('\n')
            buf = lines.pop()
            for (var i = 0; i < lines.length; i++) {
              var line = lines[i].trim()
              if (!line || !line.startsWith('data: ')) continue
              try {
                var evt = JSON.parse(line.substring(6))
                if (evt.type === 'text') {
                  fullReply += evt.delta
                  // 文字独立显示：SSE流来就更新，不等音频
                  if (marxLine) marxLine.textContent = fullReply
                  var elMarx = document.getElementById('lvMarx')
                  if (elMarx) elMarx.textContent = fullReply
                } else if (evt.type === 'audio' && evt.audio) {
                  lastReplyText = fullReply
                  liveAudioQueue.push(evt.audio)
                  if (!liveAudioPlaying) consumeLiveAudioHTTP()
                }
              } catch(e) {}
            }
            readChunk()
          }).catch(function(e) {
            console.error('[liveSSE] read err:', e)
            resumeListenHTTP()
          })
        }
        readChunk()
      })
      .catch(function(e) {
        console.error('[liveSSE] fetch err:', e)
        resumeListenHTTP()
      })
    })
    .catch(function(e) {
      console.error('[liveHTTP] voice err:', e)
      resumeListenHTTP()
    })
  }
  reader.readAsDataURL(blob)
}
function stopLiveMicHTTP() {
  liveRecState = 'stopped'
  if (liveVADTimer) { clearInterval(liveVADTimer); liveVADTimer = null }
  if (liveMediaRec && liveMediaRec.state === 'recording') { try { liveMediaRec.stop() } catch(e) {} }
  if (liveMicStream) { try { liveMicStream.getTracks().forEach(function(t){t.stop()}); liveMicStream = null } catch(e) {} }
  if (liveAudioCtx) { try { liveAudioCtx.close(); liveAudioCtx = null } catch(e) {} }
  liveAnalyser = null; liveMediaRec = null; liveRecChunks = []
  liveVADSpeaking = false; liveVADSilent = 0
  var btn = document.getElementById('lvMicBtn')
  if (btn) btn.classList.remove('on')
  liveRecState = 'idle'
}
function resumeListenHTTP() {
  if (liveRecState !== 'stopped' && liveRecState !== 'idle') {
    liveRecState = 'recording'
    document.getElementById('lvHint').textContent = '正在聆听...'
    setVideoState('idle')
    startRecSegment()
  }
}
var liveTypeTimer = null
function consumeLiveAudioHTTP() {
  if (liveAudioQueue.length === 0) { liveAudioPlaying = false; return }
  liveAudioPlaying = true
  var b64 = liveAudioQueue.shift()
  var audio = decodeB64Audio(b64)
  document.getElementById('lvHint').textContent = '正在说话...'
  audio.play().then(function() {
    setVideoState(pickVideoByReply(lastReplyText || ''))
  }).catch(function(){})
  audio.onended = function() {
    if (liveAudioQueue.length === 0) {
      liveAudioPlaying = false
      // 整段回复播完 -> 切回聆听
      setVideoState('idle')
    } else {
      consumeLiveAudioHTTP()
    }
  }
}

// ══════════════════════════════════════
// 音频播放
// ══════════════════════════════════════
function decodeB64Audio(b64) {
  var bin = atob(b64), bytes = new Uint8Array(bin.length)
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i)
  var blob = new Blob([bytes], { type: 'audio/mpeg' })
  return new Audio(URL.createObjectURL(blob))
}
function playB64(b64, btn, onEnd) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null }
  var audio = decodeB64Audio(b64)
  currentAudio = audio
  if (btn) { btn.classList.add('playing'); btn.textContent = '⏹ 播放中' }
  audio.play().catch(function(){})
  audio.onended = function() {
    currentAudio = null
    if (btn) { btn.classList.remove('playing'); btn.textContent = '▶ 聆听' }
    if (onEnd) onEnd()
  }
}

// DOM 操作
// ══════════════════════════════════════
function hideIdle() {
  var p = document.getElementById('idlePanel')
  if (p) p.style.display = 'none'
  document.getElementById('portraitQuote').classList.add('hidden')
}
function addQ(text) {
  var d = document.getElementById('dialogue')
  var div = document.createElement('div')
  div.className = 'q-row'
  div.innerHTML = '<div class="q-bbl">' + esc(text) + '</div>'
  d.appendChild(div)
}
function addA(text, audio) {
  var d = document.getElementById('dialogue')
  var div = document.createElement('div')
  div.className = 'a-row'
  var clean = esc(text).replace(/\n/g,'<br>')
  div.innerHTML = '<div class="a-meta"><img class="a-avatar" src="mks.png" alt=""><span class="a-name">Karl Marx</span></div><div class="a-card"><div class="a-card-quote">\u201C</div><div class="a-card-body">' + clean + '</div><div class="a-card-footer"><span class="a-cite">\u2014 London \u00b7 1867</span>' + (audio ? '<button class="a-play" onclick="playB64(\'' + audio + '\',this)">\u25b6 \u8046\u542c</button>' : '') + '</div></div>'
  d.appendChild(div)
}
function addThinking() {
  var d = document.getElementById('dialogue')
  var div = document.createElement('div')
  div.className = 'thinking-row'
  div.id = 'tk' + Date.now()
  div.innerHTML = '<img class="thinking-avatar" src="mks.png" alt=""><div class="thinking-bbl"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>'
  d.appendChild(div)
  return div.id
}
function addErr(msg) {
  var d = document.getElementById('dialogue')
  var div = document.createElement('div')
  div.innerHTML = '<div style="font-size:12px;color:var(--text-mu);text-align:center;padding:6px">' + msg + '</div>'
  d.appendChild(div)
}
function removeEl(id) { var e = document.getElementById(id); if (e) e.remove() }
function scrollBottom() {
  var s = document.getElementById('scroll')
  if (s) s.scrollTo({ top: s.scrollHeight, behavior: 'smooth' })
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

setMode('text')

// ── 思辨/引用模式开关 ──
let modeFlags = { sibian: false, yinyong: false }

function toggleMode(type) {
  if (modeFlags[type]) {
    modeFlags[type] = false
    document.getElementById(type === 'sibian' ? 'btnSibian' : 'btnYinyong').classList.remove('on')
  } else {
    modeFlags.sibian = false
    modeFlags.yinyong = false
    document.getElementById('btnSibian').classList.remove('on')
    document.getElementById('btnYinyong').classList.remove('on')
    modeFlags[type] = true
    document.getElementById(type === 'sibian' ? 'btnSibian' : 'btnYinyong').classList.add('on')
  }
}

function getMessageWithPrefix() {
  const box = document.getElementById('ibox')
  let text = box.value.trim()
  if (!text) return ''
  if (modeFlags.sibian) text = '【思辨:】' + text
  if (modeFlags.yinyong) text = '【引用:】' + text
  return text
}

// ── 历史对话 ──
let currentConvId = null

function openHistory() {
  document.getElementById('histMask').classList.remove('hidden')
  const panel = document.getElementById('histPanel')
  panel.classList.remove('hidden')
  setTimeout(() => panel.classList.add('open'), 10)
  loadHistoryList()
}

function closeHistory() {
  const panel = document.getElementById('histPanel')
  panel.classList.remove('open')
  setTimeout(() => {
    panel.classList.add('hidden')
    document.getElementById('histMask').classList.add('hidden')
  }, 300)
}

async function loadHistoryList() {
  const list = document.getElementById('histList')
  list.innerHTML = '<div class="hist-loading">加载中...</div>'
  try {
    const res = await fetch(API_BASE + '/conversations')
    const data = await res.json()
    if (!data.length) {
      list.innerHTML = '<div class="hist-loading">还没有历史对话</div>'
      return
    }
    list.innerHTML = data.map(item => `
      <div class="hist-item" onclick="loadConversation('${item.id}')">
        <div class="hist-item-left">
          <div class="hist-item-title">${item.title}</div>
          <div class="hist-item-time">${item.updated_at}</div>
        </div>
        <button class="hist-item-del" onclick="event.stopPropagation();deleteConversation('${item.id}',this)">✕</button>
      </div>
    `).join('')
  } catch(e) {
    list.innerHTML = '<div class="hist-loading">加载失败</div>'
  }
}

async function loadConversation(id) {
  try {
    const res = await fetch(API_BASE + '/conversations/' + id)
    const data = await res.json()
    document.getElementById('dialogue').innerHTML = ''
    document.getElementById('idlePanel').style.display = 'none'
    history = []
    currentConvId = id
    const messages = data.messages || []
    for (let i = 0; i < messages.length; i++) {
      const msg = messages[i]
      if (msg.role === 'user') {
        addQ(msg.content)
      } else if (msg.role === 'assistant') {
        addA(msg.content, null)
      }
      history.push(msg)
    }
    scrollBottom()
    closeHistory()
  } catch(e) {
    console.error('[history] 加载失败', e)
  }
}

function newConversation() {
  currentConvId = null
  history = []
  document.getElementById('dialogue').innerHTML = ''
  const idle = document.getElementById('idlePanel')
  if (idle) idle.style.display = ''
  document.getElementById('portraitQuote').classList.remove('hidden')
  closeHistory()
}

async function deleteConversation(id, btn) {
  try {
    await fetch(API_BASE + '/conversations/' + id, { method: 'DELETE' })
    btn.closest('.hist-item').remove()
  } catch(e) {}
}

async function autoSaveConversation() {
  if (history.length < 2) return
  try {
    const res = await fetch(API_BASE + '/conversations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id: currentConvId,
        messages: history
      })
    })
    const data = await res.json()
    if (data.id) currentConvId = data.id
  } catch(e) {}
}
