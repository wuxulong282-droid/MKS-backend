<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e0a08">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>对话·马克思</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');
:root{--bg:#0e0a08;--surface:#181210;--panel:#1f1814;--border:rgba(180,120,60,.18);--gold:#c8a96e;--gold-dim:rgba(200,169,110,.5);--red:#8b1a1a;--red-light:#c94040;--text:#e8ddd0;--text-dim:#8a7a6a;--marx-bg:rgba(139,26,26,.10);--user-bubble:#4a3020;--max-w:480px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;display:flex;flex-direction:column;max-width:var(--max-w);margin:0 auto;height:100dvh;position:relative}
.header{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;z-index:10}
.av{width:38px;height:38px;border-radius:50%;overflow:hidden;flex-shrink:0}
.av img{width:100%;height:100%;object-fit:cover}
.hinfo{flex:1;min-width:0}
.hname{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:700;color:var(--gold)}
.hsub{font-size:11px;color:var(--text-dim)}
.dot-st{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s}
.mode-badge{flex-shrink:0;display:none;align-items:center;gap:6px;background:var(--panel);border-bottom:1px solid var(--border);padding:4px 14px;font-size:11px;color:var(--gold-dim)}
.mode-badge.show{display:flex}
.mode-badge .tag{background:rgba(200,169,110,.12);border:1px solid var(--border);border-radius:10px;padding:1px 8px;font-size:10px;color:var(--gold)}
#audioProgressBar{height:2px;width:100%;background:transparent;flex-shrink:0;position:relative;z-index:10}
#audioProgressFill{height:100%;width:0;background:#6b1010;transition:width .15s linear}
.msgs{flex:1;overflow-y:auto;padding:12px 12px 8px;display:flex;flex-direction:column;gap:0;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.ts-div{text-align:center;font-size:10px;color:var(--text-dim);padding:12px 0 6px;letter-spacing:.04em}
.ts-div::before,.ts-div::after{content:'';display:inline-block;width:30px;height:.5px;background:var(--border);vertical-align:middle;margin:0 8px}
.msg{display:flex;gap:8px;align-items:flex-end;margin-bottom:2px;padding:2px 0}
.msg.user{flex-direction:row-reverse}
.msg.marx{margin-bottom:6px}
.mav{width:30px;height:30px;border-radius:50%;flex-shrink:0;overflow:hidden;visibility:hidden}
.mav.m{visibility:visible}
.mav img{width:100%;height:100%;object-fit:cover}
.msg.marx + .msg.marx .mav.m{visibility:hidden}
.bubble{max-width:80%;padding:8px 12px;font-size:14px;line-height:1.65;word-break:break-word;position:relative}
.marx .bubble{background:var(--marx-bg);border:1px solid rgba(139,26,26,.28);border-radius:2px 12px 12px 12px;font-family:'Noto Serif SC',serif;color:#e0d5c8}
.user .bubble{background:var(--user-bubble);border:1px solid rgba(180,120,60,.15);border-radius:12px 2px 12px 12px}
.bubble strong{color:var(--gold);font-weight:600}
.cite{display:block;font-size:11px;color:var(--gold-dim);margin-top:6px;font-style:italic;border-top:1px solid rgba(200,169,110,.1);padding-top:5px}
.vbub{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;padding:2px 0}
.vico{font-size:18px;line-height:1}
.vdur{font-size:12px;color:var(--text-dim);min-width:28px;font-variant-numeric:tabular-nums}
.vwave{display:flex;align-items:center;gap:2px;height:20px}
.vwave .bar{width:3px;border-radius:2px;background:var(--gold-dim);transition:height .12s}
.vwave.pl .bar{background:var(--gold)}
.user .vbub{flex-direction:row-reverse}
.user .vdur{text-align:right}
.spkr{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:11px;color:var(--gold-dim);cursor:pointer;background:none;border:none;font-family:inherit;padding:2px 6px;border-radius:10px;transition:background .15s}
.spkr:hover{background:rgba(200,169,110,.08)}
.spkr:active{transform:scale(.95)}
.spkr.pl{color:var(--gold)}
.think{display:flex;align-items:center;gap:5px;padding:6px 0}
.td{width:5px;height:5px;border-radius:50%;background:var(--gold-dim);animation:blink .9s ease-in-out infinite}
.td:nth-child(2){animation-delay:.22s}
.td:nth-child(3){animation-delay:.44s}
@keyframes blink{0%,80%,100%{transform:scale(1);opacity:.35}40%{transform:scale(1.4);opacity:1}}
.err-bubble{background:rgba(184,64,32,.1);border:1px solid rgba(184,64,32,.3);border-radius:10px;padding:9px 13px;font-size:13px;color:#c05030}
.input-area{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);padding:8px 10px;padding-bottom:max(8px,env(safe-area-inset-bottom));position:relative}
.irow{display:flex;gap:6px;align-items:center}
.msw{width:34px;height:34px;border-radius:50%;background:none;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-dim);transition:all .18s}
.msw:active{transform:scale(.9)}
.msw.act{color:var(--red-light);border-color:var(--red-light)}
.ibox{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:9px 14px;font-size:14px;color:var(--text);resize:none;font-family:inherit;line-height:1.5;max-height:80px;outline:none;transition:border-color .2s}
.ibox::placeholder{color:var(--text-dim)}
.ibox:focus{border-color:var(--gold-dim)}
.hold{flex:1;height:38px;border-radius:20px;border:1px solid var(--border);background:var(--panel);color:var(--text-dim);font-size:14px;cursor:pointer;font-family:inherit;display:none;align-items:center;justify-content:center;user-select:none;transition:background .1s}
.hold.show{display:flex}
.hold:active{background:#2a1f18}
.hold.pr{background:#3a2515;color:var(--gold);border-color:var(--red-light)}
.pbtn{width:34px;height:34px;border-radius:50%;background:none;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-dim);font-size:18px;transition:all .18s}
.pbtn:active{transform:scale(.9)}
.pbtn.act{color:var(--gold);border-color:var(--gold-dim)}
.sbtn{width:34px;height:34px;border-radius:50%;background:var(--red);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.sbtn:active{background:var(--red-light)}
.sbtn svg{width:16px;height:16px;fill:white}
.sbtn.hide{display:none}
.ppanel{position:absolute;bottom:calc(100% + 4px);left:10px;right:10px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:none;flex-direction:column;gap:8px;z-index:20;box-shadow:0 -4px 20px rgba(0,0,0,.4)}
.ppanel.show{display:flex}
.ppi{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:13px;color:var(--text-dim)}
.ppi:not(:last-child){border-bottom:1px solid var(--border)}
.ppi .ppl{display:flex;align-items:center;gap:8px}
.ppi .ppl .ic{font-size:16px}
.tog{width:40px;height:22px;border-radius:11px;background:#3a3028;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--text-dim);transition:transform .2s,background .2s}
.tog.on{background:var(--red)}
.tog.on::after{transform:translateX(18px);background:#fff}
.ppb{background:none;border:1px solid var(--border);border-radius:14px;padding:5px 12px;font-size:12px;color:var(--text-dim);cursor:pointer;font-family:inherit;align-self:flex-start;transition:all .15s}
.ppb:active{border-color:var(--red-light);color:var(--red-light)}
.qtags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.qtag{background:none;border:1px solid var(--border);border-radius:14px;padding:4px 10px;font-size:11px;color:var(--text-dim);cursor:pointer;font-family:inherit;transition:all .15s}
.qtag:active{border-color:var(--gold-dim);color:var(--gold)}
.pover{position:fixed;top:0;left:0;width:100%;height:100%;z-index:19;display:none}
.pover.show{display:block}
.live-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:999;display:flex;flex-direction:column;transition:opacity .25s}
.live-overlay.hidden{display:none!important}
.lv-header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.lv-back{background:none;border:none;color:var(--gold);font-size:14px;cursor:pointer;font-family:inherit;padding:4px 0}
.lv-title{font-size:14px;font-weight:500;color:var(--text-dim)}
.lv-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto;gap:6px}
.lv-avatar{width:80px;height:80px;border-radius:50%;border:2px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;margin-bottom:8px}
.lv-avatar img{width:100%;height:100%;object-fit:cover}
.lv-wave{width:240px;height:64px;flex-shrink:0;margin-bottom:10px}
.lv-status{font-size:13px;color:var(--gold-dim);text-align:center;min-height:20px;margin-bottom:4px}
.lv-status.listening{color:#d04040;font-weight:500}
.lv-status.thinking{color:var(--gold)}
.lv-status.speaking{color:#6a9}
.lv-trans{font-size:13px;color:var(--text);text-align:center;max-width:90%;padding:6px 14px;background:var(--marx-bg);border-radius:10px;border:1px solid var(--border);display:none}
.lv-trans.show{display:block}
.lv-footer{flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--surface);border-top:1px solid var(--border)}
.lv-mic{width:64px;height:64px;border-radius:50%;background:var(--red);border:3px solid var(--red-light);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:white;flex-shrink:0}
.lv-mic:active{transform:scale(.92)}
.lv-mic.lv-active{background:#b02020;border-color:white;animation:lvPulse 1s ease-in-out infinite}
@keyframes lvPulse{0%,100%{box-shadow:0 0 0 0 rgba(200,60,60,.6)}50%{box-shadow:0 0 0 12px rgba(200,60,60,0)}}
.callbtn{width:34px;height:34px;border-radius:50%;background:none;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-dim);transition:all .18s;font-size:18px}
.callbtn:active{transform:scale(.9)}
</style>
</head>
<body>

<div class="header">
  <div class="av"><img src="marx-avatar.png?v=2"></div>
  <div class="hinfo">
    <div class="hname">卡尔·马克思</div>
    <div class="hsub" id="hsub">哲学家 · 1818—1883</div>
  </div>
  <div class="dot-st" id="dot" title="服务状态"></div>
</div>

<div id="audioProgressBar"><div id="audioProgressFill"></div></div>

<div class="mode-badge" id="modeBadge">
  <span class="tag" id="modeTag">思辨模式</span>
  <span>开启中</span>
</div>

<div class="msgs" id="msgs">
  <div class="ts-div">书房·伦敦·1867年</div>
  <div class="msg marx" id="openMsg">
    <div class="mav m"><img src="marx-avatar.png?v=2"></div>
    <div class="bubble">来访者，你好。<br>我是卡尔·马克思。有何问题想与我讨论？</div>
  </div>
</div>

<div class="pover" id="pover"></div>

<div class="input-area" id="inputArea">
  <div class="ppanel" id="ppanel">
    <div class="ppi"><span class="ppl"><span class="ic">🤔</span>思辨模式</span><button class="tog" id="togD" onclick="tog('debate')"></button></div>
    <div class="ppi"><span class="ppl"><span class="ic">📖</span>引用模式</span><button class="tog" id="togC" onclick="tog('cite')"></button></div>
    <div class="ppi" style="flex-direction:column;align-items:stretch;gap:6px">
      <div style="display:flex;align-items:center;justify-content:space-between"><span class="ppl"><span class="ic">💬</span>快捷话题</span></div>
      <div class="qtags">
        <button class="qtag" onclick="qt('什么是异化劳动？')">异化劳动</button>
        <button class="qtag" onclick="qt('资本主义为何会爆发危机？')">资本主义危机</button>
        <button class="qtag" onclick="qt('什么是商品拜物教？')">商品拜物教</button>
        <button class="qtag" onclick="qt('如何理解历史唯物主义？')">历史唯物主义</button>
        <button class="qtag" onclick="qt('什么是剩余价值？')">剩余价值</button>
        <button class="qtag" onclick="qt('阶级斗争的核心是什么？')">阶级斗争</button>
      </div>
    </div>
    <div class="ppi"><span class="ppl"><span class="ic">🗑️</span>清空对话</span><button class="ppb" onclick="clearChat()">清空</button></div>
  </div>

  <div class="irow">
    <button class="msw" id="msw" onclick="swInput()" title="切换语音输入">
      <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z" fill="currentColor"/><path d="M19 11a7 7 0 0 1-14 0H3a9 9 0 0 0 8 8.94V22h2v-2.06A9 9 0 0 0 21 11h-2z" fill="currentColor"/></svg>
    </button>
    <textarea class="ibox" id="ibox" placeholder="向马克思提问..." rows="1" oninput="ar(this)" onkeydown="ok(event)"></textarea>
    <button class="hold" id="hold">按住 说话</button>
    <button class="pbtn" id="pbtn">+</button>
    <button class="callbtn" id="callBtn" onclick="enterLiveVoice()" title="实时语音对话">
      <svg viewBox="0 0 24 24" width="16" height="16"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.57.57a1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.57a1 1 0 01-.25 1.02l-2.2 2.2z" fill="currentColor"/></svg>
    </button>
    <button class="sbtn" id="sbtn" onclick="sendT()">
      <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<div id="liveOverlay" class="live-overlay hidden">
  <div class="lv-header">
    <button class="lv-back" onclick="exitLiveVoice()">← 退出</button>
    <span class="lv-title">语音对话</span>
    <span style="width:60px"></span>
  </div>
  <div class="lv-body">
    <div class="lv-avatar">
      <img src="marx-avatar.png?v=2">
    </div>
    <canvas class="lv-wave" id="lvWave"></canvas>
    <div class="lv-status" id="lvStatus">点击麦克风开始</div>
    <div class="lv-trans" id="lvTrans"></div>
  </div>
  <div class="lv-footer">
    <button class="lv-mic" id="lvMic" onclick="toggleLiveMic(this)">
      <svg viewBox="0 0 24 24" width="28" height="28">
        <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z" fill="white"/>
        <path d="M19 11a7 7 0 0 1-14 0H3a9 9 0 0 0 8 8.94V22h2v-2.06A9 9 0 0 0 21 11h-2z" fill="white"/>
      </svg>
    </button>
  </div>
</div>

<script>
// ============================================================
// shorthand & config
// ============================================================
const ge = id => document.getElementById(id);
const API = window.location.origin;
let hist = [], sending = false, modeI = 'text', thinkId = null;
let debate = false, cite = false, lastTs = null, tsCnt = 0;
let mr = null, aChunks = [], recStart = 0, isRec = false, recTimer = null;
let aQueue = [], isPlay = false, curAud = null;
let liveWS = null, liveAudioCtx = null, liveMic = null, liveScriptNode = null;
let liveActive = false;
let liveRecorder = null;
let liveRecorderChunks = [];
let livePollTimer = null;
let liveVADCtx = null;
let liveStream = null;


fetch(API + '/health').then(r=>r.json()).then(()=>{ge('dot').style.background='#4a9'}).catch(()=>{ge('dot').style.background='#c04'});

function swInput() {
  if (modeI === 'text') {
    modeI = 'voice';
    ge('ibox').style.display = 'none';
    ge('hold').classList.add('show');
    ge('sbtn').classList.add('hide');
    ge('msw').classList.add('act');
    ge('msw').title = '\u5207\u6362\u6587\u5b57\u8f93\u5165';
  } else {
    modeI = 'text';
    ge('ibox').style.display = '';
    ge('hold').classList.remove('show');
    ge('sbtn').classList.remove('hide');
    ge('msw').classList.remove('act');
    ge('msw').title = '\u5207\u6362\u8bed\u97f3\u8f93\u5165';
  }
}

// === \u6309\u4f4f\u8bf4\u8bdd ===
const hb = ge('hold');
hb.addEventListener('touchstart', hS);
hb.addEventListener('touchend', hE);
hb.addEventListener('touchcancel', hC);
hb.addEventListener('mousedown', hS);
hb.addEventListener('mouseup', hE);
hb.addEventListener('mouseleave', hC);

function hS(e) { console.log('[hold] mousedown'); e.preventDefault(); if (isRec) { console.log('[hold] already rec, skip'); return; } console.log('[hold] start rec'); hb.classList.add('pr'); hb.textContent = '\u677e\u5f00 \u53d1\u9001'; stRec(); }
function hE(e) { console.log('[hold] mouseup'); e.preventDefault(); if (!isRec) { console.log('[hold] not rec, skip'); return; } console.log('[hold] stop rec'); hb.classList.remove('pr'); hb.textContent = '\u6309\u4f4f \u8bf4\u8bdd'; spRec(true); }
function hC(e) { e.preventDefault(); if (!isRec) return; hb.classList.remove('pr'); hb.textContent = '\u6309\u4f4f \u8bf4\u8bdd'; spRec(false); }

async function stRec() {
  try {
    const st = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mt = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
    mr = new MediaRecorder(st, { mimeType: mt });
    aChunks = [];
    recStart = Date.now();
    mr.ondataavailable = e => { if (e.data.size > 0) { console.log('[hold] dataavailable, size:', e.data.size); aChunks.push(e.data); } else { console.log('[hold] dataavailable empty chunk'); } };
    mr._stream = st;
mr.onstop = () => { st.getTracks().forEach(t => t.stop()); };
    mr.start();
    isRec = true;
    recTimer = setInterval(() => {
      const sec = Math.floor((Date.now() - recStart) / 1000);
      hb.textContent = '\u677e\u5f00 \u53d1\u9001 ' + sec + '\u2033';
    }, 200);
  } catch (e) {
    console.error('[hold] \u5f55\u97f3\u5931\u8d25', e);
    hb.classList.remove('pr');
    hb.textContent = '\u6309\u4f4f \u8bf4\u8bdd';
  }
}

function spRec(send) {
  console.log('[hold] spRec, send:', send, 'chunks:', aChunks.length, 'mr:', mr ? mr.state : 'null');
  if (!mr || mr.state === 'inactive') { console.log('[hold] spRec skip: inactive'); return; }
  isRec = false;
  if (recTimer) { clearInterval(recTimer); recTimer = null; }
  var shouldSend = send;
  // 在 onstop 回调中发送，因为 dataavailable 在 stop() 之后才触发
  mr.onstop = function() {
    console.log('[hold] onstop fired, aChunks:', aChunks.length);
    if (shouldSend && aChunks.length > 0) {
      console.log('[hold] onstop -> sendVoiceMsg');
      var d = Math.floor((Date.now() - recStart) / 1000);
      sendVoiceMsg(aChunks, d);
    }
    aChunks = [];
    // 清理流
    if (mr._stream) mr._stream.getTracks().forEach(function(t) { t.stop(); });
  };
  mr.stop();
}

async function sendVoiceMsg(chunks, dur) {
  console.log('[voiceMsg] ===== \u5f00\u59cb\u5904\u7406\u8bed\u97f3, dur:', dur);
  if (!chunks || chunks.length === 0) { console.log('[voiceMsg] \u65e0\u97f3\u9891\u6570\u636e'); return; }
  const bl = new Blob(chunks, { type: mr ? mr.mimeType : 'audio/webm' });
  const ds = Math.min(dur, 60);
  aVB('user', ds);
  scrollB();

  // \u65b9\u5f0f1: /chat_voice
  console.log('[voiceMsg] \u5c1d\u8bd5 /chat_voice ...');
  try {
    const reader = new FileReader();
    const b64 = await new Promise((resolve, reject) => {
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(bl);
    });

// webm → wav 转换
function convertWebmToWav(webmBlob) {
  return new Promise(function(resolve, reject) {
    var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var fileReader = new FileReader();
    fileReader.onload = async function() {
      try {
        var audioBuffer = await audioCtx.decodeAudioData(fileReader.result);
        var numChannels = audioBuffer.numberOfChannels;
        var sampleRate = audioBuffer.sampleRate;
        var length = audioBuffer.length;
        var offlineCtx = new OfflineAudioContext(1, length, 16000);
        var source = offlineCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(offlineCtx.destination);
        source.start();
        var rendered = await offlineCtx.startRendering();
        var pcmData = rendered.getChannelData(0);
        var wavBuffer = encodeWav(pcmData, 16000);
        var wavBlob = new Blob([wavBuffer], { type: 'audio/wav' });
        resolve(wavBlob);
      } catch(e) {
        console.error('[convert] 转码失败:', e);
        // 降级：返回原始 blob
        resolve(webmBlob);
      }
    };
    fileReader.onerror = function() { reject(fileReader.error); };
    fileReader.readAsArrayBuffer(webmBlob);
  });
}

function encodeWav(samples, sampleRate) {
  var buffer = new ArrayBuffer(44 + samples.length * 2);
  var view = new DataView(buffer);
  function writeString(offset, str) { for (var i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); }
  writeString(0, 'RIFF');
  view.setUint32(4, 36 + samples.length * 2, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeString(36, 'data');
  view.setUint32(40, samples.length * 2, true);
  for (var i = 0; i < samples.length; i++) {
    var s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return buffer;
}

function speechToText(blob) {
  return new Promise((resolve, reject) => {
    if (!('SpeechRecognition' in window) && !('webkitSpeechRecognition' in window)) {
      reject(new Error('浏览器不支持'));
      return;
    }
    const sr = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    sr.lang = 'zh-CN';
    sr.interimResults = false;
    sr.maxAlternatives = 1;
    let done = false;
    sr.onresult = e => { done = true; resolve(e.results[0][0].transcript); };
    sr.onerror = e => { if (!done) { done = true; reject(e.error); } };
    sr.onend = () => { if (!done) { done = true; reject(new Error('no-speech')); } };
    sr.start();
    setTimeout(() => { if (!done) { sr.abort(); done = true; reject(new Error('timeout')); } }, 10000);
  });
}

function startLiveMic(btn) {
  setLiveStatus('正在连接...', '');

  liveActive = true;
  btn.classList.add('lv-active');
  setLiveStatus('正在聊听...', 'listening');
  startLiveWave('idle');

  var audioChunks = [];
  var vadSpeaking = false;
  var vadSilentStart = 0;
  var sending = false;
  var pollRunning = true;
  var recorder = null;
  var analyser = null;
  var audioCtx = null;
  var stream = null;
  var pollTimer = null;

  (async function() {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });

      // AnalyserNode 实时音量检测
      var src = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      src.connect(analyser);
      var dataArray = new Uint8Array(analyser.frequencyBinCount);

      // MediaRecorder 录音
      var mt = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
      recorder = new MediaRecorder(stream, { mimeType: mt });
      recorder.start(1000);

      recorder.ondataavailable = function(e) {
        if (e.data.size > 0) audioChunks.push(e.data);
      };

      startLiveWave('user');

      // 轮询循环：每500ms 检测音量
      pollTimer = setInterval(function() {
        if (!pollRunning || sending) return;

        // 获取当前音量
        analyser.getByteTimeDomainData(dataArray);
        var sum = 0;
        for (var i = 0; i < dataArray.length; i++) {
          var v = (dataArray[i] - 128) / 128;
          sum += v * v;
        }
        var rms = Math.sqrt(sum / dataArray.length);
        var hasVoice = rms > 0.03; // 语音阈值

        console.log('[liveVAD] rms=' + rms.toFixed(3) + ' hasVoice=' + hasVoice + ' speaking=' + vadSpeaking + ' chunks=' + audioChunks.length);

        if (hasVoice && !vadSpeaking) {
          // 开始说话
          console.log('[liveVAD] -> SPEAKING');
          vadSpeaking = true;
          vadSilentStart = 0;
          setLiveStatus('正在听您说话...', 'listening');
          startLiveWave('user');
        } else if (!hasVoice && vadSpeaking) {
          // 安静中
          if (vadSilentStart === 0) {
            vadSilentStart = Date.now();
            console.log('[liveVAD] -> silent start');
          } else if (Date.now() - vadSilentStart > 2000) {
            // 安静2秒，发送
            console.log('[liveVAD] -> SEND! chunks=' + audioChunks.length);
            vadSpeaking = false;
            vadSilentStart = 0;
            sending = true;
            setLiveStatus('正在识别...', 'thinking');
            startLiveWave('idle');

            // 发送音频
            (async function() {
              try {
                if (audioChunks.length === 0) { sending = false; return; }
                var bl = new Blob(audioChunks, { type: 'audio/webm' });
                audioChunks = [];
                if (bl.size < 2000) { sending = false; return; }

                console.log('[liveVAD] sending raw webm... len:', bl.size);
                // 直接发 webm base64，后端用 ffmpeg 转码
                var reader = new FileReader();
                var liveB64 = await new Promise(function(res, rej) {
                  reader.onload = function() { res(reader.result.split(',')[1]); };
                  reader.onerror = rej;
                  reader.readAsDataURL(bl);
                });

                console.log('[liveVAD] sending... b64 len:', b64.length);
                var r = await fetch(API + '/chat_voice', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ audio_b64: liveB64, history: [], tts: true })
                });
                var d = await r.json();
                if (d.error) throw new Error(d.error);

                console.log('[liveVAD] reply:', d.reply ? d.reply.substring(0, 40) : 'empty');
                if (d.reply) {
                  var el = document.getElementById('lvTrans');
                  if (el) { el.textContent = d.reply; el.className = 'lv-trans show'; }
                  if (d.audio) {
                    setLiveStatus('正在播放...', 'speaking');
                    playLiveAudio(d.audio);
                  } else {
                    setLiveStatus('聊听中...', 'listening');
                  }
                  addTS();
                  aM('user', '🎤 语音消息');
                  aM('marx', d.reply);
                  if (hist) { hist.push({role:'user',content:d.reply.substring(0,20)}); hist.push({role:'assistant',content:d.reply}); }
                  scrollB();
                }
                setLiveStatus('聊听中...', 'listening');
              } catch(e) {
                console.error('[liveVAD] error:', e);
                setLiveStatus('识别失败', '');
              }
              sending = false;
            })();
          }
        } else if (hasVoice && vadSpeaking) {
          // 正在说话，重置安静计时器
          vadSilentStart = 0;
        } else if (!hasVoice && !vadSpeaking) {
          // 两者都安静
          vadSilentStart = 0;
        }
      }, 500);

      // 保存变量
      livePollTimer = pollTimer;
      liveRecorder = recorder;
      liveVADCtx = audioCtx;
      liveStream = stream;

    } catch(e) {
      console.error('[liveVAD] 启动失败:', e);
      setLiveStatus('麦克风失败', '');
      stopLiveMic();
    }
  })();
}

function stopLiveMic() {
  liveActive = false;
  if (livePollTimer) { clearInterval(livePollTimer); livePollTimer = null; }
  if (liveRecorder && liveRecorder.state !== 'inactive') { try { liveRecorder.stop(); } catch(e) {} }
  if (liveStream) { try { liveStream.getTracks().forEach(function(t){t.stop();}); } catch(e) {}}
  if (liveVADCtx) { try { liveVADCtx.close(); } catch(e) {} }
  liveRecorder = null;
  liveVADCtx = null;
  liveStream = null;
  var btn = document.getElementById('lvMic');

}

var liveWaveAnimId = null;
function startLiveWave(mode) {
  if (liveWaveAnimId) cancelAnimationFrame(liveWaveAnimId);
  var canvas = document.getElementById('lvWave');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  canvas.width = 240; canvas.height = 64;
  var bars = 48, barW = 240 / bars - 2;
  function draw() {
    ctx.clearRect(0, 0, 240, 64);
    for (var i = 0; i < bars; i++) {
      var h = mode === 'user' ? 6 + Math.sin(Date.now() / 200 + i * 0.5) * 4 + 2
            : mode === 'marx' ? 8 + Math.sin(Date.now() / 500 + i * 0.3) * 5
            : 4 + Math.sin(Date.now() / 600 + i * 0.2) * 2;
      var x = i * (barW + 2) + 1;
      var y = (64 - h) / 2;
      ctx.fillStyle = mode === 'user' ? 'rgba(200,60,60,0.6)'
                     : mode === 'marx' ? 'rgba(200,169,110,0.4)'
                     : 'rgba(200,169,110,0.18)';
      ctx.beginPath();
      ctx.roundRect(x, y, barW, h, 2);
      ctx.fill();
    }
    liveWaveAnimId = requestAnimationFrame(draw);
  }
  draw();
}
function stopLiveWave() {
  if (liveWaveAnimId) { cancelAnimationFrame(liveWaveAnimId); liveWaveAnimId = null; }
  var canvas = document.getElementById('lvWave');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 240, 64);
}

  var au = new Audio(url);
  au._url = url;

  au.onended = function() { URL.revokeObjectURL(au._url); liveAudio = null; };
  au.play().catch(function(e) { console.error('[liveAudio] play失败:', e); URL.revokeObjectURL(au._url); liveAudio = null; });
}

function autoPlay(el) { aQueue.unshift({ b64: el.dataset.audio, el: el }); if (!isPlay) playQ(); }

function base64ToBlobUrl(b64) {
  try {
    var binary = atob(b64);
    var bytes = new Uint8Array(binary.length);
    for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    var blob = new Blob([bytes], {type: 'audio/mpeg'});
    return URL.createObjectURL(blob);
  } catch(e) {
    console.error('[audio] base64ToBlobUrl失败:', e);
    return null;
  }
}

function playQ() {

  var item = aQueue.shift();
  var sp = item.el.querySelector('.spkr'); if (sp) sp.classList.add('pl');
  var url = base64ToBlobUrl(item.b64);
  if (!url) { if (sp) sp.classList.remove('pl'); isPlay = false; playQ(); return; }
  var au = new Audio(url);
  au._el = item.el; au._url = url; curAud = au;
  au.ontimeupdate = function() { var p = (au.currentTime / au.duration) * 100; ge('audioProgressFill').style.width = Math.min(p, 100) + '%'; };
  au.onended = function() { if (sp) sp.classList.remove('pl'); ge('audioProgressFill').style.width = '0'; URL.revokeObjectURL(au._url); curAud = null; isPlay = false; playQ(); };
  au.onerror = function() { if (sp) sp.classList.remove('pl'); ge('audioProgressFill').style.width = '0'; if(au._url)URL.revokeObjectURL(au._url); curAud = null; isPlay = false; playQ(); };
  au.play().catch(function() { if (sp) sp.classList.remove('pl'); if(au._url)URL.revokeObjectURL(au._url); curAud = null; isPlay = false; playQ(); });
}

function clearChat() {
  if (!confirm('确定清空对话？')) return;
  ge('msgs').innerHTML = '<div class="ts-div">书房·伦敦·1867年</div><div class="msg marx"><div class="mav m"><img src="marx-avatar.png?v=2"></div><div class="bubble">来访者，你好。<br>我是卡尔·马克思。有何问题想与我讨论？</div></div>';
  hist = []; tsCnt = 0;
  ge('ppanel').classList.remove('show');
  ge('pover').classList.remove('show');
  ge('pbtn').classList.remove('act');
}
