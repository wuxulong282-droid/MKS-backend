<style>
/* 鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲
   TOKEN SYSTEM 鈥?椹厠鎬濅功鎴?鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲 */
:root {
  --bg:       #1b1410;
  --bg2:      #231a14;
  --bg3:      #2c2018;
  --bg4:      #342518;
  --gold:     #c8a36a;
  --gold-l:   #e1c28a;
  --gold-dim: rgba(200,163,106,.3);
  --gold-glow:rgba(200,163,106,.12);
  --red:      #8b2e2e;
  --red-l:    #b84040;
  --text:     #f5e7d0;
  --text-dim: #cdbb9e;
  --text-mu:  #8a7560;
  --border:   rgba(200,163,106,.22);
  --border-l: rgba(200,163,106,.42);
  --r:        14px;
  --r-sm:     8px;
}

/* 鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲
   RESET & BASE
鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲 */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  height: 100dvh;
  position: relative;
}

/* 鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲
   HEADER
鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲 */
.hd {
  flex-shrink: 0;
  padding: 10px 18px 8px;
  background: linear-gradient(180deg,#1b1410 0%,rgba(27,20,16,0) 100%);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  position: relative;
  z-index: 10;
}
.hd-left { display: flex; flex-direction: column; gap: 1px; }
.hd-name {
  font-family: 'IM Fell English', 'Georgia', serif;
  font-size: 20px;
  color: var(--gold-l);
  letter-spacing: .08em;
  line-height: 1;
}
.hd-sub {
  font-size: 10px;
  color: var(--text-mu);
  letter-spacing: .05em;
}
.hd-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}
.hd-loc {
  font-size: 11px;
  color: var(--text-mu);
  font-style: italic;
  font-family: 'IM Fell English', serif;
}
.hd-mode {
  font-size: 10px;
  color: var(--gold);
  letter-spacing: .04em;
  display: flex;
  align-items: center;
  gap: 4px;
}
.hd-mode-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 5px var(--gold);
  animation: modePulse 2s ease-in-out infinite;
}
@keyframes modePulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* 鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲
   PORTRAIT SECTION锛堥┈鍏嬫€濆浘鍍忓尯锛?鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲 */
.portrait-section {
  flex-shrink: 0;
  position: relative;
  height: 42vh;
  overflow: hidden;
  margin: 0 14px;
  border-radius: var(--r);
  border: 1px solid var(--border-l);
  box-shadow:
    0 0 0 1px rgba(200,163,106,.06),
    inset 0 0 60px rgba(0,0,0,.5),
    0 8px 32px rgba(0,0,0,.6);
}

/* 鍥涜瑁呴グ */
.corner { position: absolute; width: 18px; height: 18px; z-index: 5; }
.corner::before, .corner::after {
  content: '';
  position: absolute;
  background: var(--gold-l);
  opacity: .8;
}
.corner.tl { top: 8px; left: 8px; }
.corner.tl::before { width: 100%; height: 1.5px; top: 0; left: 0; }
.corner.tl::after  { width: 1.5px; height: 100%; top: 0; left: 0; }
.corner.tr { top: 8px; right: 8px; }
.corner.tr::before { width: 100%; height: 1.5px; top: 0; right: 0; }
.corner.tr::after  { width: 1.5px; height: 100%; top: 0; right: 0; }
.corner.bl { bottom: 8px; left: 8px; }
.corner.bl::before { width: 100%; height: 1.5px; bottom: 0; left: 0; }
.corner.bl::after  { width: 1.5px; height: 100%; bottom: 0; left: 0; }
.corner.br { bottom: 8px; right: 8px; }
.corner.br::before { width: 100%; height: 1.5px; bottom: 0; right: 0; }
.corner.br::after  { width: 1.5px; height: 100%; bottom: 0; right: 0; }

/* 椹厠鎬濈収鐗?*/
.marx-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
  transition: opacity .5s ease;
}

/* 瑙嗛锛堝疄鏃惰闊虫椂瑕嗙洊鐓х墖锛?*/
.marx-video {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity .5s ease;
  z-index: 2;
}
.marx-video.active { opacity: 1; }

/* 搴曢儴娓愬彉閬僵 */
.portrait-gradient {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 55%;
  background: linear-gradient(
    to top,
    rgba(27,20,16,1) 0%,
    rgba(27,20,16,.7) 40%,
    transparent 100%
  );
  z-index: 3;
}

/* 鍚嶈█娴眰 */
.portrait-quote {
  position: absolute;
  bottom: 14px;
  left: 14px; right: 14px;
  z-index: 4;
  transition: opacity .5s ease;
}
.portrait-quote.hidden { opacity: 0; pointer-events: none; }
.quote-text {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 12.5px;
  color: var(--text-dim);
  line-height: 1.75;
  letter-spacing: .02em;
}
.quote-author {
  font-size: 11px;
  color: var(--gold-dim);
  margin-top: 5px;
  font-style: italic;
  font-family: 'IM Fell English', serif;
}
.quote-author::before { content: '鈥?'; }

/* 鐘舵€佽鏍?*/
.portrait-status {
  position: absolute;
  top: 10px; left: 10px;
  z-index: 5;
  background: rgba(27,20,16,.85);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: .05em;
  backdrop-filter: blur(4px);
  transition: opacity .3s;
}
.portrait-status.hidden { opacity: 0; }

/* 鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲
   STATUS BAR锛堢姸鎬佹潯锛?鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲 */
.status-bar {
  flex-shrink: 0;
  margin: 6px 14px 0;
  height: 30px;
  background: linear-gradient(90deg, var(--bg3), var(--bg2), var(--bg3));
  border: 1px solid var(--border);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.status-bar-text {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: .05em;
}
.status-dots { display: flex; gap: 4px; }
.status-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--gold-dim);
}
.status-dot:nth-child(1) { animation: sd .9s ease-in-out infinite; }
.status-dot:nth-child(2) { animation: sd .9s ease-in-out .3s infinite; }
.status-dot:nth-child(3) { animation: sd .9s ease-in-out .6s infinite; }
@keyframes sd { 0%,80%,100%{opacity:.3;transform:scale(1)} 40%{opacity:1;transform:scale(1.4)} }
.status-dots.hidden { display: none; }

/* 鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲
   MAIN CONTENT AREA
鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲 */
.main {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.scroll {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px 8px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}
.scroll::-webkit-scrollbar { width: 2px; }
.scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* 鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲
   IDLE STATE锛堝緟鏈?鈥?鎺ㄨ崘闂锛?鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲 */
.idle-panel { display: flex; flex-direction: column; gap: 10px; }

.guide-label {
  font-size: 10px;
  color: var(--text-mu);
  letter-spacing: .1em;
  text-transform: uppercase;
  text-align: center;
  padding: 2px 0;
}

.guide-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}
.guide-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 9px 11px;
  font-size: 12px;
  color: var(--text-dim);
  cursor: pointer;
  line-height: 1.5;
  font-family: 'Noto Serif SC', serif;
  transition: all .22s ease;
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.guide-card-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
.guide-card:active {
  border-color: var(--gold-dim);
  color: var(--gold);
  background: var(--bg3);
  box-shadow: 0 0 14px var(--gold-glow);
}

/* 鍏ュ彛鎸夐挳 */
.entry-row {
  display: flex;
  gap: 7px;
  justify-content: center;
}
.entry-btn {
  flex: 1;
  max-width: 140px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 8px 10px;
  font-size: 11px;
  color: var(--text-mu);
  cursor: pointer;
  font-family: inherit;
  letter-spacing: .04em;
  transition: all .22s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.entry-btn:active {
  border-color: var(--gold-dim);
  color: var(--gold);
  background: var(--gold-glow);
}

/* 鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲
   DIALOGUE LOG锛堝璇濊褰曪級
鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲 */
.dialogue { display: flex; flex-direction: column; gap: 14px; }

/* 鏃堕棿鍒嗗壊绾?*/
.time-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 10px;
  color: var(--text-mu);
  letter-spacing: .05em;
}
.time-divider::before, .time-divider::after {
  content: '';
  flex: 1;
  height: .5px;
  background: var(--border);
}

/* 鐢ㄦ埛娑堟伅 */
.q-row { display: flex; justify-content: flex-end; }
.q-bbl {
  max-width: 78%;
  background: rgba(139,46,46,.14);
  border: 1px solid rgba(139,46,46,.28);
  border-radius: 12px 12px 2px 12px;
  padding: 9px 13px;
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.7;
}

/* 璇煶娑堟伅 */
.voice-row { display: flex; justify-content: flex-end; }
.voice-bbl {
  background: rgba(139,46,46,.1);
  border: 1px solid rgba(139,46,46,.22);
  border-radius: 20px;
  padding: 8px 14px;
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 7px;
}
.voice-wave { color: var(--gold-dim); font-size: 14px; }

/* 椹厠鎬濆洖绛旓紙缇婄毊绾稿崱鐗囷級*/
.a-row { display: flex; flex-direction: column; gap: 5px; }
.a-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-left: 2px;
}
.a-avatar {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1px solid var(--gold-dim);
  object-fit: cover;
  flex-shrink: 0;
}
.a-name {
  font-size: 11px;
  color: var(--gold);
  letter-spacing: .06em;
  font-family: 'IM Fell English', serif;
}
.a-card {
  background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
  border: 1px solid var(--border);
  border-radius: 2px 12px 12px 12px;
  padding: 13px 15px 10px;
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.85;
  font-family: 'Noto Serif SC', serif;
  position: relative;
}
.a-card-quote {
  position: absolute;
  top: 6px; left: 10px;
  font-size: 26px;
  color: rgba(200,163,106,.2);
  font-family: Georgia, serif;
  line-height: 1;
  pointer-events: none;
}
.a-card-body { padding-left: 12px; }

/* 鎵撳瓧鏈烘晥鏋滃厜鏍?*/
.a-card-body.typing::after {
  content: '鈻?;
  color: var(--gold);
  animation: cur .6s step-end infinite;
  font-size: 12px;
}
@keyframes cur { 0%,100%{opacity:1} 50%{opacity:0} }

.a-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 9px;
  padding-top: 7px;
  border-top: .5px solid var(--border);
}
.a-cite {
  font-size: 10px;
  color: var(--text-mu);
  font-style: italic;
  font-family: 'IM Fell English', serif;
}
.a-play {
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 10px;
  color: var(--text-mu);
  cursor: pointer;
  font-family: inherit;
  transition: all .2s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.a-play:active { border-color: var(--gold-dim); color: var(--gold); }
.a-play.playing { color: var(--gold); border-color: var(--gold-dim); }

/* 鎬濊€冧腑 */
.thinking-row { display: flex; align-items: center; gap: 8px; }
.thinking-avatar {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1px solid var(--gold-dim);
  object-fit: cover;
  flex-shrink: 0;
}
.thinking-bbl {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 2px 12px 12px 12px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.t-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold-dim);
  animation: td .9s ease-in-out infinite;
}
.t-dot:nth-child(2) { animation-delay: .22s; }
.t-dot:nth-child(3) { animation-delay: .44s; }
@keyframes td { 0%,80%,100%{transform:scale(1);opacity:.3} 40%{transform:scale(1.5);opacity:1} }

/* 鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲
   INPUT AREA
鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲 */
.ia {
  flex-shrink: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 8px 14px 12px;
  display: flex;
  flex-direction: column;

function setVideoState(state) {

function pickVideoByReply(text) {
  if (!text) return 'speakA'
  if (text.includes('銆?) || text.includes('钁椾綔') || text.includes('鎵嬬')) return 'citing'
  if (text.includes('鎬荤粨') || text.includes('缁间笂') || text.includes('鍥犳')) return 'summary'
  if (text.includes('鐞嗚') || text.includes('杈╄瘉') || text.includes('鍞墿')) return 'theory'
  if (text.includes('锛?) && text.length < 80) return 'emphA'
  if (text.includes('蹇呴』') || text.includes('缁濅笉') || text.includes('涓嶅緱涓?)) return 'emphB'
  return Math.random() > 0.5 ? 'speakA' : 'speakB'
}

async function send() {
  if (sending) return
  const text = getMessageWithPrefix()
  if (!text) return
  sending = true
  const box = document.getElementById('ibox')
  box.value = ''; box.style.height = 'auto'

  hideIdle()
  addQ(text)
  history.push({ role: 'user', content: text })

  setStatus('thinking')
  document.getElementById('portraitQuote').classList.add('hidden')
  const tid = addThinking()
  scrollBottom()

  try {
    const res = await fetch(API_BASE + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: history.slice(0, -1), tts: ttsOn })
    })
    const data = await res.json()
    removeEl(tid)
    if (data.error) { addErr(data.error); history.pop() }
    else {
      addA(data.reply, data.audio); autoSaveConversation()
      history.push({ role: 'assistant', content: data.reply })
      if (history.length > 20) history = history.slice(-20)
      setStatus('speaking')
      if (data.audio && ttsOn) {
        playB64(data.audio, null, () => setStatus('idle'))
      } else {
        setTimeout(() => setStatus('idle'), 3000)
      }
    }
  } catch (e) {
    removeEl(tid)
    // 婕旂ず妯″紡锛氭病鏈夊悗绔椂鏄剧ず绀轰緥鍥炵瓟
    const demoReply = getDemoReply(text)
    addA(demoReply, null)
    history.push({ role: 'assistant', content: demoReply })
    setStatus('speaking')
    setTimeout(() => setStatus('idle'), 4000)
  }

  sending = false
  scrollBottom()
}

function startRec() {
  navigator.mediaDevices.getUserMedia({ audio: true }).then(st => {
    const mt = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/webm'
    mr = new MediaRecorder(st, { mimeType: mt })
    aChunks = []; recStart = Date.now()
    mr.ondataavailable = e => { if (e.data.size > 0) aChunks.push(e.data) }
    mr.onstop = () => {
      st.getTracks().forEach(t => t.stop())
      if (shouldSend && aChunks.length > 0) {
        const dur = Math.max(1, Math.floor((Date.now() - recStart) / 1000))
        sendVoice(aChunks.slice(), dur)
      }
      aChunks = []; shouldSend = false
    }
    mr.start(100); isRec = true
  }).catch(e => console.error('[mic]', e))

async function sendVoice(chunks, dur) {

  const blob = new Blob(chunks, { type: 'audio/webm' })
  const b64 = await new Promise(res => {
    const r = new FileReader()
    r.onload = () => res(r.result.split(',')[1])
    r.readAsDataURL(blob)
  })

  try {
    const resp = await fetch(API_BASE + '/chat_voice', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ audio_b64: b64, history })
    })
    const data = await resp.json()
    removeEl(tid)
    if (data.transcript) history.push({ role: 'user', content: data.transcript })
    addA(data.reply, data.audio); autoSaveConversation()
    history.push({ role: 'assistant', content: data.reply })
    setStatus('speaking')
    if (data.audio) playB64(data.audio, null, () => setStatus('idle'))
    else setTimeout(() => setStatus('idle'), 3000)
  } catch (e) {
    removeEl(tid)
    addA('璇煶澶勭悊鍑洪敊锛岃閲嶈瘯', null)
    setStatus('idle')
  }
  scrollBottom()
}

function startLiveMicHTTP(btn) {
  if (btn) btn.classList.add('on')
  document.getElementById('lvHint').textContent = '姝ｅ湪鍚姩楹﹀厠椋?..'
  liveRecState = 'starting'

    .then(function(stream) {
      liveMicStream = stream

      document.getElementById('lvHint').textContent = '姝ｅ湪鑱嗗惉...'
      setVideoState('idle')
      liveAudioCtx = new (window.AudioContext || window.webkitAudioContext)()

      src.connect(liveAnalyser)
      startRecSegment()
      var dataArray = new Uint8Array(liveAnalyser.frequencyBinCount)
      liveVADTimer = setInterval(function() {
        if (liveRecState === 'stopped' || liveRecState === 'idle') { clearInterval(liveVADTimer); return }
        liveAnalyser.getByteTimeDomainData(dataArray)
        var maxV = 0
        for (var k = 0; k < dataArray.length; k++) {
          var v = Math.abs(dataArray[k] - 128) / 128
          if (v > maxV) maxV = v
        }
        var hasVoice = maxV > 0.03
        if (hasVoice && !liveVADSpeaking) {
          liveVADSpeaking = true; liveVADSilent = 0
          document.getElementById('lvHint').textContent = '姝ｅ湪鍚偍璇磋瘽...'
        } else if (!hasVoice && liveVADSpeaking) {
          liveVADSilent += 200
          if (liveVADSilent >= 2200) {
            liveVADSpeaking = false; liveVADSilent = 0
            finishSegAndSend()
          }
        } else if (hasVoice && liveVADSpeaking) { liveVADSilent = 0 }
      }, 200)

      document.getElementById('lvHint').textContent = '楹﹀厠椋庡け璐? ' + e.message

function startRecSegment() {
  if (liveRecState === 'stopped' || liveRecState === 'idle' || !liveMicStream) return
  if (liveRecState === 'waiting') return
  liveRecChunks = []
  var mt = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm'
  var rec = new MediaRecorder(liveMicStream, { mimeType: mt })
  liveMediaRec = rec
  rec.ondataavailable = function(e) { if (e.data.size > 0) liveRecChunks.push(e.data) }
  rec.onstop = function() {
    if (liveRecChunks.length > 0 && liveRecState !== 'stopped' && liveRecState !== 'idle') {
      sendSegHTTP(liveRecChunks)
    } else if (liveRecState !== 'stopped' && liveRecState !== 'idle') {
      startRecSegment()
    }
  }
  rec.start()
  setTimeout(function() { if (rec.state === 'recording' && liveRecState !== 'stopped') rec.stop() }, 10000)
}
function finishSegAndSend() {

    liveVADSpeaking = false

    liveMediaRec.stop()
  }
}
function sendSegHTTP(chunks) {
  if (liveRecState === 'stopped' || liveRecState === 'idle') return
  liveRecState = 'waiting'
  document.getElementById('lvHint').textContent = '椹厠鎬濇鍦ㄦ€濊€?
  var blob = new Blob(chunks, { type: 'audio/webm' })
  var reader = new FileReader()
  reader.onload = function() {
    var b64 = reader.result.split(',')[1]
    // 绗竴姝ワ細鍙仛璇煶璇嗗埆锛屼笉闇€瑕丩LM鍥炲锛坈hat_stream浼氬啀鍋氾級
    fetch(API_BASE + '/asr', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ audio_b64: b64 })
    })
    .then(function(r) { return r.json() })
    .then(function(d) {
      var transcript = d.text || d.transcript || ''
      if (!transcript) { resumeListenHTTP(); return }
      var tlog = document.getElementById('lvTlog')
      var elMarx = document.getElementById('lvMarx')
      if (elMarx) elMarx.textContent = ''
      var elUser = document.getElementById('lvUser')
      if (elUser) elUser.textContent = transcript
      if (tlog) {
        var userLine = document.createElement('div')
        userLine.className = 'tl-user'
        userLine.textContent = transcript
        tlog.appendChild(userLine)
        tlog.scrollTop = tlog.scrollHeight
      }
      var marxLine = null
      if (tlog) {
        marxLine = document.createElement('div')
        marxLine.className = 'tl-marx'
        marxLine.textContent = ''
        tlog.appendChild(marxLine)
      }
      if (transcript) history.push({ role: 'user', content: transcript })
      document.getElementById('lvHint').textContent = '椹厠鎬濇鍦ㄦ€濊€?
      fetch(API_BASE + '/chat_stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: transcript, history: history.slice(-8) })
      })
      .then(function(resp) {
        var rdr = resp.body.getReader()
        var decoder = new TextDecoder()
        var buf = ''
        var fullReply = ''
        function readChunk() {
          rdr.read().then(function(result) {
            if (result.done) {
              if (history) { history.push({role:'assistant', content: fullReply}); if (history.length > 20) history = history.slice(-20) }
              // 娴佺粨鏉燂紝濡傛灉闊抽宸叉挱瀹屽垯鍒噄dle
              if (!liveAudioPlaying && liveAudioQueue.length === 0) {
                setVideoState('idle')
              }
              resumeListenHTTP()
              return
            }
            buf += decoder.decode(result.value, {stream: true})
            var lines = buf.split('\n')
            buf = lines.pop()
            for (var i = 0; i < lines.length; i++) {
              var line = lines[i].trim()
              if (!line || !line.startsWith('data: ')) continue
              try {
                var evt = JSON.parse(line.substring(6))
                if (evt.type === 'text') {
                  fullReply += evt.delta
                  // 鏂囧瓧鐙珛鏄剧ず锛歋SE娴佹潵灏辨洿鏂帮紝涓嶇瓑闊抽
                  if (marxLine) marxLine.textContent = fullReply
                  var elMarx = document.getElementById('lvMarx')
                  if (elMarx) elMarx.textContent = fullReply
                } else if (evt.type === 'audio' && evt.audio) {
                  lastReplyText = fullReply
                  liveAudioQueue.push(evt.audio)
                  if (!liveAudioPlaying) consumeLiveAudioHTTP()
                }
              } catch(e) {}
            }
            readChunk()
          }).catch(function(e) {
            console.error('[liveSSE] read err:', e)
            resumeListenHTTP()
          })
        }
        readChunk()
      })
      .catch(function(e) {
        console.error('[liveSSE] fetch err:', e)
        resumeListenHTTP()
      })
    })
    .catch(function(e) {
      console.error('[liveHTTP] voice err:', e)
      resumeListenHTTP()
    })
  }
  reader.readAsDataURL(blob)
}
function stopLiveMicHTTP() {
  liveRecState = 'stopped'
  if (liveVADTimer) { clearInterval(liveVADTimer); liveVADTimer = null }
  if (liveMediaRec && liveMediaRec.state === 'recording') { try { liveMediaRec.stop() } catch(e) {} }
  if (liveMicStream) { try { liveMicStream.getTracks().forEach(function(t){t.stop()}); liveMicStream = null } catch(e) {} }
  if (liveAudioCtx) { try { liveAudioCtx.close(); liveAudioCtx = null } catch(e) {} }
  liveAnalyser = null; liveMediaRec = null; liveRecChunks = []
  liveVADSpeaking = false; liveVADSilent = 0
  var btn = document.getElementById('lvMicBtn')
  if (btn) btn.classList.remove('on')
  liveRecState = 'idle'
}
function resumeListenHTTP() {
  if (liveRecState !== 'stopped' && liveRecState !== 'idle') {
    liveRecState = 'recording'
    document.getElementById('lvHint').textContent = '姝ｅ湪鑱嗗惉...'
    setVideoState('idle')
    startRecSegment()
  }
}
var liveTypeTimer = null
function consumeLiveAudioHTTP() {
  if (liveAudioQueue.length === 0) { liveAudioPlaying = false; return }
  liveAudioPlaying = true
  var b64 = liveAudioQueue.shift()
  var audio = decodeB64Audio(b64)
  document.getElementById('lvHint').textContent = '姝ｅ湪璇磋瘽...'

      liveAudioPlaying = false
      // 鏁存鍥炲鎾畬 -> 鍒囧洖鑱嗗惉
      setVideoState('idle')
    } else {
      consumeLiveAudioHTTP()
    }
  }
}

function decodeB64Audio(b64) {
  var bin = atob(b64), bytes = new Uint8Array(bin.length)
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i)
  var blob = new Blob([bytes], { type: 'audio/mpeg' })
  return new Audio(URL.createObjectURL(blob))
}
function playB64(b64, btn, onEnd) {

    if (onEnd) onEnd()
  }
}

  return text
}

// 鈹€鈹€ 鍘嗗彶瀵硅瘽 鈹€鈹€
let currentConvId = null

function openHistory() {
  document.getElementById('histMask').classList.remove('hidden')
  const panel = document.getElementById('histPanel')
  panel.classList.remove('hidden')
  setTimeout(() => panel.classList.add('open'), 10)
  loadHistoryList()
}

function closeHistory() {
  const panel = document.getElementById('histPanel')
  panel.classList.remove('open')
  setTimeout(() => {
    panel.classList.add('hidden')
    document.getElementById('histMask').classList.add('hidden')
  }, 300)
}

async function loadHistoryList() {
  const list = document.getElementById('histList')
  list.innerHTML = '<div class="hist-loading">鍔犺浇涓?..</div>'
  try {
    const res = await fetch(API_BASE + '/conversations')
    const data = await res.json()
    if (!data.length) {
      list.innerHTML = '<div class="hist-loading">杩樻病鏈夊巻鍙插璇?/div>'
      return
    }
    list.innerHTML = data.map(item => `
      <div class="hist-item" onclick="loadConversation('${item.id}')">
        <div class="hist-item-left">
          <div class="hist-item-title">${item.title}</div>
          <div class="hist-item-time">${item.updated_at}</div>
        </div>
        <button class="hist-item-del" onclick="event.stopPropagation();deleteConversation('${item.id}',this)">鉁?/button>
      </div>
    `).join('')
  } catch(e) {
    list.innerHTML = '<div class="hist-loading">鍔犺浇澶辫触</div>'
  }
}

async function loadConversation(id) {
  try {
    const res = await fetch(API_BASE + '/conversations/' + id)
    const data = await res.json()
    document.getElementById('dialogue').innerHTML = ''
    document.getElementById('idlePanel').style.display = 'none'
    history = []
    currentConvId = id
    const messages = data.messages || []
    for (let i = 0; i < messages.length; i++) {
      const msg = messages[i]
      if (msg.role === 'user') {
        addQ(msg.content)
      } else if (msg.role === 'assistant') {
        addA(msg.content, null)
      }
      history.push(msg)
    }
    scrollBottom()
    closeHistory()
  } catch(e) {
    console.error('[history] 鍔犺浇澶辫触', e)
  }
}

function newConversation() {
  currentConvId = null
  history = []
  document.getElementById('dialogue').innerHTML = ''
  const idle = document.getElementById('idlePanel')
  if (idle) idle.style.display = ''
  document.getElementById('portraitQuote').classList.remove('hidden')
  closeHistory()
}

async function deleteConversation(id, btn) {
  try {
    await fetch(API_BASE + '/conversations/' + id, { method: 'DELETE' })
    btn.closest('.hist-item').remove()
  } catch(e) {}
}

async function autoSaveConversation() {
  if (history.length < 2) return
  try {
    const res = await fetch(API_BASE + '/conversations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id: currentConvId,
        messages: history
      })
    })
    const data = await res.json()
    if (data.id) currentConvId = data.id
  } catch(e) {}
}
</script>
